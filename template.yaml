# DBT Diary Card Template
# New PageSpec format for gutenberg edit mode.
# Blocks with _editable: true render as form inputs in edit mode.

title: "Diary Card — {{DATE}}"
theme: mono

hero:
  title: "Daily Diary Card"
  subtitle: "{{DATE}}"
  body: "Track emotions, urges, skills, and daily functioning."

blocks:
  # ── BOOKKEEPING ──────────────────────────────────────────
  - section_label:
      text: BOOKKEEPING

  - table:
      _editable: true
      caption: Daily functioning and self-care
      headers:
        - {label: Metric, size: narrow}
        - {label: Value}
      headerColumn: true
      rows:
        - [Sleep, ""]
        - [Meds, "No"]
        - [Self, "0"]
        - [Partner, "0"]
        - [Work, "0"]
        - [Social, "0"]

  # ── EMOTIONS ─────────────────────────────────────────────
  - section_label:
      text: EMOTIONS

  - table:
      _editable: true
      caption: "Rate each emotion 0–10 (0 = absent, 10 = overwhelming)"
      headers:
        - {label: Emotion, size: narrow}
        - {label: "Rating (0–10)"}
      headerColumn: true
      rows:
        - [Sadness, "0"]
        - [Anger, "0"]
        - [Anxiety, "0"]
        - [Shame, "0"]
        - [Loneliness, "0"]
        - [Hope, "0"]

  # ── URGES / SKILLS ──────────────────────────────────────
  - section_label:
      text: URGES / SKILLS

  - table:
      _editable: true
      caption: "Urges 0–10, skills Yes/No"
      headers:
        - {label: Item, size: narrow}
        - {label: Value}
      headerColumn: true
      rows:
        - [Suicidal Urges, "0"]
        - [Self-Harm Urges, "0"]
        - [Substance Use, "0"]
        - [Mindfulness, "No"]
        - [Distress Tolerance, "No"]
        - [Emotion Regulation, "No"]
        - [Interpersonal Skills, "No"]

  # ── DAILY NOTES ──────────────────────────────────────────
  - section_label:
      text: DAILY NOTES

  - prose:
      _editable: true
      text: |
        **Triggers:**


        **Skills Used:**


        **Therapist Focus:**


  # ── CLOSING ──────────────────────────────────────────────
  - closing:
      text: |
        ---
        *Complete at end of day. All data stored securely.*
