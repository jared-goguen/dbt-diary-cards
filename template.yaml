# DBT Diary Card Template
# Tracker blocks render as colored grids with ratings, toggles, and text.
# Blocks with _editable: true become interactive form inputs in edit mode.
# Rating scale: 1-5, where 3 = neutral. Polarity drives color direction.

title: "Diary Card — {{DATE}}"
theme: mono

hero:
  title: "Daily Diary Card"
  subtitle: "{{DATE}}"
  body: "Track emotions, urges, skills, and daily functioning."

blocks:
  # ── BOOKKEEPING ──────────────────────────────────────────
  - section_label:
      text: BOOKKEEPING

  - tracker:
      _editable: true
      caption: "1 = low · 3 = neutral · 5 = high"
      cols: 4
      items:
        - {label: Self, value: "3", type: rating, max: 5}
        - {label: Partner, value: "3", type: rating, max: 5}
        - {label: World, value: "3", type: rating, max: 5}
        - {label: Sleep, value: "", type: text}

  # ── EMOTIONS ─────────────────────────────────────────────
  - section_label:
      text: EMOTIONS

  - tracker:
      _editable: true
      caption: "1 = absent · 3 = neutral · 5 = intense"
      cols: 4
      items:
        - {label: Depression, value: "3", type: rating, max: 5, polarity: negative}
        - {label: Anxiety, value: "3", type: rating, max: 5, polarity: negative}
        - {label: Frustration, value: "3", type: rating, max: 5, polarity: negative}
        - {label: Joy, value: "3", type: rating, max: 5, polarity: positive}

  # ── BEHAVIOR ─────────────────────────────────────────────
  - section_label:
      text: BEHAVIOR

  - tracker:
      _editable: true
      caption: "1 = none · 3 = moderate · 5 = severe"
      cols: 4
      items:
        - {label: Ideation, value: "3", type: rating, max: 5, polarity: negative}
        - {label: Injury, value: "3", type: rating, max: 5, polarity: negative}
        - {label: Substance, value: "3", type: rating, max: 5, polarity: negative}
        - {label: Participation, value: "3", type: rating, max: 5, polarity: positive}

  # ── DAILY NOTES ──────────────────────────────────────────
  - section_label:
      text: DAILY NOTES

  - prose:
      _editable: true
      text: ""

  # ── CLOSING ──────────────────────────────────────────────
  - closing:
      text: |
        ---
        *Complete at end of day. All data stored securely.*
