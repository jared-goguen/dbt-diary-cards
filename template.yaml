# DBT Diary Card Template
# Tracker blocks render as colored grids with ratings, toggles, and text.
# Blocks with _editable: true become interactive form inputs in edit mode.

title: "Diary Card — {{DATE}}"
theme: mono

hero:
  title: "Daily Diary Card"
  subtitle: "{{DATE}}"
  body: "Track emotions, urges, skills, and daily functioning."

blocks:
  # ── BOOKKEEPING ──────────────────────────────────────────
  - section_label:
      text: BOOKKEEPING

  - tracker:
      _editable: true
      caption: Daily functioning
      cols: 4
      items:
        - {label: Self, value: "0", type: rating, max: 10}
        - {label: Partner, value: "0", type: rating, max: 10}
        - {label: World, value: "0", type: rating, max: 10}
        - {label: Sleep, value: "", type: text}

  # ── EMOTIONS ─────────────────────────────────────────────
  - section_label:
      text: EMOTIONS

  - tracker:
      _editable: true
      caption: "Rate 0–10 (0 = absent, 10 = overwhelming)"
      cols: 4
      items:
        - {label: Depression, value: "0", type: rating, max: 10}
        - {label: Anxiety, value: "0", type: rating, max: 10}
        - {label: Frustration, value: "0", type: rating, max: 10}
        - {label: Joy, value: "0", type: rating, max: 10}

  # ── BEHAVIOR ─────────────────────────────────────────────
  - section_label:
      text: BEHAVIOR

  - tracker:
      _editable: true
      caption: "Rate 0–10"
      cols: 4
      items:
        - {label: Ideation, value: "0", type: rating, max: 10}
        - {label: Injury, value: "0", type: rating, max: 10}
        - {label: Substance, value: "0", type: rating, max: 10}
        - {label: Participation, value: "0", type: rating, max: 10}

  # ── DAILY NOTES ──────────────────────────────────────────
  - section_label:
      text: DAILY NOTES

  - prose:
      _editable: true
      text: ""

  # ── CLOSING ──────────────────────────────────────────────
  - closing:
      text: |
        ---
        *Complete at end of day. All data stored securely.*
