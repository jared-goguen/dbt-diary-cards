# DBT Diary Card Template
# Tracker blocks render as colored grids with ratings, toggles, and text.
# Blocks with _editable: true become interactive form inputs in edit mode.

title: "Diary Card — {{DATE}}"
theme: mono

hero:
  title: "Daily Diary Card"
  subtitle: "{{DATE}}"
  body: "Track emotions, urges, skills, and daily functioning."

blocks:
  # ── BOOKKEEPING ──────────────────────────────────────────
  - section_label:
      text: BOOKKEEPING

  - tracker:
      _editable: true
      caption: Daily functioning
      cols: 3
      items:
        - {label: Self, value: "0", type: rating, max: 10}
        - {label: Partner, value: "0", type: rating, max: 10}
        - {label: World, value: "0", type: rating, max: 10}
        - {label: Sleep, value: "", type: text}
        - {label: Meds, value: "No", type: toggle}

  # ── EMOTIONS ─────────────────────────────────────────────
  - section_label:
      text: EMOTIONS

  - tracker:
      _editable: true
      caption: "Rate 0–10 (0 = absent, 10 = overwhelming)"
      items:
        - {label: Sadness, value: "0", type: rating, max: 10}
        - {label: Anger, value: "0", type: rating, max: 10}
        - {label: Fear, value: "0", type: rating, max: 10}
        - {label: Shame, value: "0", type: rating, max: 10}
        - {label: Guilt, value: "0", type: rating, max: 10}
        - {label: Joy, value: "0", type: rating, max: 10}

  # ── URGES / SKILLS ──────────────────────────────────────
  - section_label:
      text: URGES / SKILLS

  - tracker:
      _editable: true
      caption: "Urges 0–10, skills Yes/No"
      items:
        - {label: Suicidal Urges, value: "0", type: rating, max: 10}
        - {label: Self-Harm, value: "0", type: rating, max: 10}
        - {label: Substance Use, value: "0", type: rating, max: 10}
        - {label: Mindfulness, value: "No", type: toggle}
        - {label: Distress Tolerance, value: "No", type: toggle}
        - {label: Emotion Regulation, value: "No", type: toggle}
        - {label: Interpersonal, value: "No", type: toggle}

  # ── DAILY NOTES ──────────────────────────────────────────
  - section_label:
      text: DAILY NOTES

  - prose:
      _editable: true
      text: ""


  # ── CLOSING ──────────────────────────────────────────────
  - closing:
      text: |
        ---
        *Complete at end of day. All data stored securely.*
