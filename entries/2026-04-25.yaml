title: Diary Card — 2026-04-25
theme: mono
hero:
  title: Daily Diary Card
  subtitle: 2026-04-25
  body: Track emotions, urges, skills, and daily functioning.
blocks:
  - section_label:
      text: BOOKKEEPING
  - tracker:
      caption: Daily functioning
      cols: 3
      items:
        - label: Sleep
          value: ""
          type: text
        - label: Meds
          value: No
          type: toggle
        - label: Self
          value: "0"
          type: rating
          max: 10
        - label: Partner
          value: "0"
          type: rating
          max: 10
        - label: World
          value: "0"
          type: rating
          max: 10
  - section_label:
      text: EMOTIONS
  - tracker:
      caption: Rate 0–10 (0 = absent, 10 = overwhelming)
      items:
        - label: Sadness
          value: "0"
          type: rating
          max: 10
        - label: Anger
          value: "0"
          type: rating
          max: 10
        - label: Fear
          value: "0"
          type: rating
          max: 10
        - label: Shame
          value: "0"
          type: rating
          max: 10
        - label: Guilt
          value: "0"
          type: rating
          max: 10
        - label: Joy
          value: "0"
          type: rating
          max: 10
  - section_label:
      text: URGES / SKILLS
  - tracker:
      caption: Urges 0–10, skills Yes/No
      items:
        - label: Suicidal Urges
          value: "0"
          type: rating
          max: 10
        - label: Self-Harm
          value: "0"
          type: rating
          max: 10
        - label: Substance Use
          value: "0"
          type: rating
          max: 10
        - label: Mindfulness
          value: No
          type: toggle
        - label: Distress Tolerance
          value: No
          type: toggle
        - label: Emotion Regulation
          value: No
          type: toggle
        - label: Interpersonal
          value: No
          type: toggle
  - section_label:
      text: DAILY NOTES
  - prose:
      text: Test notes
  - closing:
      text: |
        ---
        *Complete at end of day. All data stored securely.*
